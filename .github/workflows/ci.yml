name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Packages
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Engine bindings
        run: |
          cd backend
          DATABASE_URL="postgresql://mock:mock@localhost:5432/mock" npx prisma generate

      - name: Verify Types and Build Compilation
        run: |
          cd backend
          npm run build

  frontend-ci:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Packages
        run: |
          cd frontend
          npm ci

      - name: Verify Next.js Build Compilation
        run: |
          cd frontend
          NEXT_PUBLIC_API_URL="https://backend.com/api" npm run build
